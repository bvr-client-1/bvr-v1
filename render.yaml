services:
  - type: web
    name: bvr-api
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm run backend
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: FRONTEND_URL
        sync: false
      - key: FRONTEND_URLS
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: OWNER_EMAIL
        sync: false
      - key: OWNER_PASSWORD_HASH
        sync: false
      - key: KITCHEN_LOGIN_ID
        sync: false
      - key: KITCHEN_PASSWORD_HASH
        sync: false
      - key: GOOGLE_PLACES_API_KEY
        sync: false
      - key: GOOGLE_PLACE_ID
        sync: false
      - key: RESTAURANT_LAT
        value: 17.0654277
      - key: RESTAURANT_LNG
        value: 79.2686857
      - key: DELIVERY_RADIUS_KM
        value: 4
      - key: FREE_DELIVERY_ENABLED
        value: true
      - key: FREE_DELIVERY_COUPON_CODE
        value: FREEDEL
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: SUPABASE_KEEPALIVE_INTERVAL_HOURS
        value: 48
      - key: REVIEW_SYNC_INTERVAL_HOURS
        value: 24
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX
        value: 100
